                    { type: "image", url: "https://images.unsplash.com/photo-1612817288484-6f916006741a?auto=format&fit=crop&w=300&h=300&q=80" },

                date: "10/01/26",
                productName: "Hydrating Eye Cream",
                body: "It's decent but a bit greasy for my oily skin. Nice packaging though.",
                media: []
            },
            {
                id: 5,
                rating: 5,
                userName: "Alex Mercer",
                userAvatar: null,
                date: "05/01/26",
                productName: "Hydrating Eye Cream",
                body: "Best eye cream I've ever used. Here is a quick video showcasing the texture!",
                media: [
                    { type: "video", url: "https://assets.mixkit.co/videos/preview/mixkit-skin-cream-being-applied-41882-large.mp4" }
                ]
            }
        ];
        document.addEventListener('DOMContentLoaded', () => {
            const writeReviewBtn = document.querySelector('.qr-btn-green');
            const formCard = document.querySelector('.qr-form-card');
            const closeFormBtn = document.querySelector('.qr-form-close-btn');
            const modalOverlay = document.getElementById('qr-modal-overlay');
            const filterPills = document.querySelectorAll('.qr-pill');
            const modalStars = document.querySelectorAll('.qr-form-star-item');
            const submitBtn = document.querySelector('.qr-form-submit-btn');
            const sortBtn = document.getElementById('qr-sort-btn');
            const sortMenu = document.getElementById('qr-sort-menu');
            const menuItems = document.querySelectorAll('.qr-menu-item');

            let selectedRating = 0;
            // Restore sort & filter from sessionStorage so selections survive page refreshes
            let currentFilter = sessionStorage.getItem('qr_filter') || 'All';
            const allowedSorts = ['highest', 'lowest', 'pictures-first', 'videos-first', 'only-pictures'];
            let currentSort = sessionStorage.getItem('qr_sort') || 'highest';
            if (!allowedSorts.includes(currentSort)) {
                currentSort = 'highest';
                sessionStorage.setItem('qr_sort', currentSort);
            }

            // Initial reviews dataset
            const reviewsData = window.qorixReviewQuickReviewWidget || [];

            // Render Reviews lists
            function renderReviews() {
                const listContainer = document.querySelector('.qr-reviews-list');
                listContainer.innerHTML = '';

                // Calculate dynamic average and total reviews
                const totalReviews = reviewsData.length;
                const totalRating = reviewsData.reduce((sum, r) => sum + r.rating, 0);
                const averageRating = totalReviews > 0 ? (totalRating / totalReviews).toFixed(1) : '0.0';

                // Update storefront header metrics
                document.querySelector('.qr-rating-num').innerText = averageRating;
                document.querySelector('.qr-rating-meta').innerText = `${totalReviews} ${totalReviews === 1 ? 'review' : 'reviews'}`;

                // Filter
                let processedReviews = [...reviewsData];
                if (currentFilter !== 'All') {
                    processedReviews = processedReviews.filter(r => r.rating === parseInt(currentFilter));
                }

                if (currentSort === 'only-pictures') {
                    processedReviews = processedReviews.filter(r => r.media && r.media.length > 0);
                }

                // Sort
                processedReviews.sort((a, b) => {
                    if (currentSort === 'highest') {
                        return b.rating - a.rating;
                    } else if (currentSort === 'lowest') {
                        return a.rating - b.rating;
                    } else if (currentSort === 'pictures-first') {
                        const aHasImg = a.media && a.media.some(m => m.type === 'image') ? 1 : 0;
                        const bHasImg = b.media && b.media.some(m => m.type === 'image') ? 1 : 0;
                        return bHasImg - aHasImg;
                    } else if (currentSort === 'videos-first') {
                        const aHasVid = a.media && a.media.some(m => m.type === 'video') ? 1 : 0;
                        const bHasVid = b.media && b.media.some(m => m.type === 'video') ? 1 : 0;
                        return bHasVid - aHasVid;
                    }
                    return 0;
                });

                if (processedReviews.length === 0) {
                    listContainer.innerHTML = '<div class="qr-no-reviews">No reviews found matching the filters.</div>';
                    return;
                }

                // Populate list
                processedReviews.forEach((review, index) => {
                    const reviewItem = document.createElement('div');
                    reviewItem.className = 'qr-review-item';
                    reviewItem.setAttribute('data-rating', review.rating);

                    // Stars HTML
                    let starsHtml = '';
                    for (let i = 1; i <= 5; i++) {
                        const fill = i <= review.rating ? '#FF9500' : '#B5B5B5';
                        starsHtml += `
                            <div class="qr-review-star-item">
                               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.3536 4.94761C12.81 3.80761 11.19 3.80761 10.6464 4.94761L8.97842 8.44201L5.13962 8.94721C3.88922 9.11281 3.38762 10.6536 4.30322 11.5224L7.11122 14.1888L6.40682 17.9952C6.17642 19.236 7.48802 20.1888 8.59682 19.5876L12 17.7396L15.4032 19.5876C16.512 20.1888 17.8236 19.236 17.5932 17.9952L16.8888 14.1888L19.6968 11.5224C20.6112 10.6536 20.1108 9.11281 18.8604 8.94721L15.0204 8.44201L13.3536 4.94761Z" fill="${fill}"/>
                                </svg></div>
                            `;
                    }

                    // Avatar HTML
                    let avatarHtml = '';
                    if (review.userAvatar) {
                        avatarHtml = `<div class="qr-review-avatar" style="background-image: url('${review.userAvatar}'); background-size: cover; background-position: center;"></div>`;
                    } else {
                        avatarHtml = `
                            <div class="qr-review-avatar qr-avatar-rahat">
                                <div class="qr-user-placeholder-icon">
                                    <div class="qr-user-placeholder-vector-1"></div>
                                    <div class="qr-user-placeholder-vector-2"></div>
                                </div>
                            </div>
                        `;
                    }

                    // Media HTML
                    let mediaHtml = '';
                    if (review.media && review.media.length > 0) {
                        mediaHtml = '<div class="qr-review-media-row">';
                        review.media.forEach(m => {
                            if (m.type === 'video') {
                                mediaHtml += `
                                    <div class="qr-review-thumb-video">
                                        <video src="${m.url}" muted playsinline loop></video>
                                        <div class="qr-video-play-overlay">
                                            <svg viewBox="0 0 24 24" fill="#FFFFFF">
                                                <path d="M8 5v14l11-7z"/>
                                            </svg>
                                        </div>
                                    </div>
                                `;
                            } else {
                                mediaHtml += `<div class="qr-review-thumb" style="background-image: url('${m.url}');"></div>`;
                            }
                        });
                        mediaHtml += '</div>';
                    }

                    reviewItem.innerHTML = `
                        <div class="qr-review-stars-user-block">
                            <div class="qr-review-stars-row">
                                ${starsHtml}
                            </div>
                            <div class="qr-review-user-row">
                                <div class="qr-review-user-meta-block">
                                    ${avatarHtml}
                                    <div class="qr-review-user-text-block">
                                        <div class="qr-review-user-name">${escapeHtml(review.userName)}</div>
                                        <div class="qr-review-user-date">${review.date}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="qr-review-text-block">
                            <div class="qr-review-product-name">${escapeHtml(review.productName)}</div>
                            <div class="qr-review-body-text">${escapeHtml(review.body)}</div>
                        </div>
                        ${mediaHtml}
                    `;

                    listContainer.appendChild(reviewItem);

                    // Divider
                    if (index < processedReviews.length - 1) {
                        const divider = document.createElement('div');
                        divider.className = 'qr-review-divider';
                        listContainer.appendChild(divider);
                    }
                });

                // Attach video overlay controls
                document.querySelectorAll('.qr-review-thumb-video').forEach(wrapper => {
                    const video = wrapper.querySelector('video');
                    const playOverlay = wrapper.querySelector('.qr-video-play-overlay');

                    wrapper.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (video.paused) {
                            video.play();
                            playOverlay.classList.add('hidden');
                        } else {
                            video.pause();
                            playOverlay.classList.remove('hidden');
                        }
                    });
                });
            }

            function escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, function (m) { return map[m]; });
            }

            // Modal Controls
            const openModal = () => {
                formCard.classList.remove('hidden');
                modalOverlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Prevent main page scrolling
            };

            const closeModal = () => {
                formCard.classList.add('hidden');
                modalOverlay.classList.add('hidden');
                document.body.style.overflow = ''; // Restore main page scrolling
            };

            writeReviewBtn.addEventListener('click', openModal);
            closeFormBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', closeModal);

            // Restore active filter pill from sessionStorage using data-filter attribute
            filterPills.forEach(pill => {
                const pillFilter = pill.getAttribute('data-filter');
                if (pillFilter === currentFilter) {
                    filterPills.forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                }
            });

            // Filter pills logic
            filterPills.forEach(pill => {
                pill.addEventListener('click', () => {
                    filterPills.forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    currentFilter = pill.getAttribute('data-filter');
                    sessionStorage.setItem('qr_filter', currentFilter);
                    renderReviews();
                });
            });

            // Stars Selection Logic
            modalStars.forEach((star, index) => {
                star.addEventListener('mouseover', () => {
                    highlightStars(index + 1);
                });

                star.addEventListener('mouseout', () => {
                    highlightStars(selectedRating);
                });

                star.addEventListener('click', () => {
                    selectedRating = index + 1;
                    highlightStars(selectedRating);
                });
            });

            function highlightStars(rating) {
                modalStars.forEach((star, index) => {
                    if (index < rating) {
                        star.classList.add('selected');
                    } else {
                        star.classList.remove('selected');
                    }
                });
            }

            // Restore active sort menu item from sessionStorage
            menuItems.forEach(item => {
                if (item.getAttribute('data-sort') === currentSort) {
                    menuItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                }
            });

            // Sort Menu Toggle & Selection logic
            sortBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                sortMenu.classList.toggle('hidden');
            });

            menuItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menuItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    sortMenu.classList.add('hidden');

                    currentSort = item.getAttribute('data-sort');
                    sessionStorage.setItem('qr_sort', currentSort);
                    renderReviews();
                });
            });

            document.addEventListener('click', (e) => {
                if (!sortMenu.classList.contains('hidden') &&
                    !sortMenu.contains(e.target) &&
                    !sortBtn.contains(e.target)) {
                    sortMenu.classList.add('hidden');
                }
            });

            // Review Submission Logic
            submitBtn.addEventListener('click', (e) => {
                e.preventDefault();

                const reviewText = document.querySelector('.qr-form-textarea').value.trim();
                const nameInput = document.querySelector('.qr-form-input[placeholder="Enter your name"]');
                const emailInput = document.querySelector('.qr-form-input[placeholder="Enter your email"]');
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();

                // Validations
                if (selectedRating === 0) {
                    alert('Please select a rating star.');
                    return;
                }
                if (reviewText === '') {
                    alert('Please enter your review text.');
                    return;
                }
                if (name === '') {
                    alert('Please enter your name.');
                    return;
                }

                const newReview = {
                    id: reviewsData.length + 1,
                    rating: selectedRating,
                    userName: name,
                    userAvatar: null,
                    date: new Date().toLocaleDateString('en-US'),
                    productName: "Hydrating Eye Cream",
                    body: reviewText,
                    media: []
                };

                // Submit state
                submitBtn.disabled = true;
                const submitText = document.querySelector('.qr-form-submit-btn-text');
                const originalText = submitText.innerText;
                submitText.innerText = 'Submitting...';

                // Simulated API call (delay of 600ms for premium feels)
                setTimeout(() => {
                    reviewsData.unshift(newReview);

                    // Reset Form
                    document.querySelector('.qr-form-textarea').value = '';
                    nameInput.value = '';
                    emailInput.value = '';
                    selectedRating = 0;
                    highlightStars(0);

                    // Re-render
                    renderReviews();

                    // Close modal
                    closeModal();

                    // Reset submit button state
                    submitBtn.disabled = false;
                    submitText.innerText = originalText;

                    alert('Thank you! Your review has been submitted successfully.');
                }, 600);
            });

            // Initial Render
            renderReviews();
        });
    </script>
</body>

</html>
